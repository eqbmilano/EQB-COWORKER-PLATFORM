services:
  # Backend API
  - type: web
    name: eqb-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm run build --workspace=@eqb/api
    startCommand: npm --prefix apps/api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: eqb-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
        sync: false
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_CLIENT_ID
        sync: false
      - key: AUTH0_CLIENT_SECRET
        sync: false
      - key: AUTH0_M2M_CLIENT_ID
        sync: false
      - key: AUTH0_M2M_CLIENT_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@eqbplatform.com
      - key: FROM_NAME
        value: EQB Platform
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: eu-south-1
      - key: AWS_S3_BUCKET_NAME
        value: eqb-platform-documents
      - key: WEB_BASE_URL
        value: https://eqb-platform-web.vercel.app
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /
    autoDeploy: true

databases:
  - name: eqb-db
    databaseName: eqb_platform
    user: eqb_user

  - name: eqb-redis
    plan: free
